services:
  connectsphere-db:
    image: mysql:8.0
    container_name: connectsphere-db
    ports:
      - "3307:3306"
    # 🛡️ THE ARCHITECTURAL GUARANTEE: Force MySQL to use native password plugin and optimize buffer pool.
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./docker-config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - mysql_data:/var/lib/mysql
    networks:
      - connectsphere-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-registry:
    build: ./service-registry
    mem_limit: 512m
    container_name: service-registry
    ports:
      - "8761:8761"
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx384m
    networks:
      - connectsphere-network

  api-gateway:
    build: ./api-gateway
    mem_limit: 512m
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx384m
      - SPRING_JPA_OPEN_IN_VIEW=false
      - EUREKA_SERVER=http://service-registry:8761/eureka/
    depends_on:
      - service-registry
      - auth-service
      - post-service
      - comment-service
      - like-service
      - follow-service
      - notification-service
      - media-service
      - search-service
    networks:
      - connectsphere-network

  auth-service:
    build: ./auth-service
    mem_limit: 512m
    container_name: auth-service
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx384m
      - SPRING_JPA_OPEN_IN_VIEW=false
      - SPRING_APPLICATION_NAME=auth-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://connectsphere-db:3306/connectsphere_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=mukul
      - SPRING_DATASOURCE_PASSWORD=password
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_JDBC=DEBUG
      - JWT_SECRET=ConnectSphereSecretKey2026ConnectSphereSecretKey2026ConnectSphereSecretKey
      - EUREKA_SERVER=http://service-registry:8761/eureka/
    depends_on:
      connectsphere-db:
        condition: service_healthy
      service-registry:
        condition: service_started
    networks:
      - connectsphere-network

  post-service:
    build: ./post-service
    mem_limit: 512m
    container_name: post-service
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx384m

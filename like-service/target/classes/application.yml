server:
  port: 8083

spring:
  application:
    name: like-service
  datasource:
    url: ${DB_URL:jdbc:mysql://connectsphere-db:3306/like_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:mukul}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:ConnectSphereSecretKey2026ConnectSphereSecretKey2026ConnectSphereSecretKey}

post-service:
  url: ${POST_SERVICE_URL:http://post-service:8081}

notification-service:
  url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}

comment-service:
  url: ${COMMENT_SERVICE_URL:http://comment-service:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://service-registry:8761/eureka/}

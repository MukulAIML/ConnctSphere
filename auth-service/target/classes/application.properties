# ============================================================
# ConnectSphere — Auth Service Configuration
# ============================================================
spring.application.name=auth-service
server.port=8080

# ── Database ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://connectsphere-db:3306/connectsphere_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:mukul}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:ConnectSphereSecretKey2026ConnectSphereSecretKey2026ConnectSphereSecretKey}
app.jwt.expiration-ms=86400000

# ── OAuth2 (replace with real credentials) ───────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

# ── Swagger / OpenAPI ─────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────
logging.level.com.connectsphere=DEBUG

# ── Eureka ────────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://service-registry:8761/eureka/}
eureka.instance.prefer-ip-address=true
